name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auth_service
        options: >-
          --health-cmd "pg_isready -U user -d auth_service" --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:6.2-alpine
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Wait for Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U user && break || sleep 1
          done

      - name: Install dependencies
        run: npm ci

      - name: Seed database
        env:
          PGPASSWORD: password
        run: psql -h localhost -U user -d auth_service -f seeds/init.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/auth_service?schema=public
          REDIS_URL: redis://localhost:6379
          API_PORT: 8080
          JWT_SECRET: testsecret
          JWT_REFRESH_SECRET: testrefreshsecret
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          GITHUB_CLIENT_ID: dummy
          GITHUB_CLIENT_SECRET: dummy
        run: npm test
